name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6>=6.6 httpx>=0.27 ebooklib>=0.18 lxml>=5.0 appdirs>=1.4 babel>=2.14 pyinstaller>=6.0 Pillow

    - name: Build Normal (Folder)
      run: |
        pyinstaller lingua.spec --noconfirm

    - name: Build Standalone (OneFile)
      run: |
        pyinstaller lingua_onefile.spec --noconfirm

    - name: Create Installer (Inno Setup)
      run: |
        iscc lingua_installer.iss

    - name: Upload Folder Build (Portable)
      uses: actions/upload-artifact@v4
      with:
        name: Lingua-Windows-Portable-Folder
        path: dist/Lingua/

    - name: Upload Standalone EXE (Portable)
      uses: actions/upload-artifact@v4
      with:
        name: Lingua-Windows-Portable-Single-EXE
        path: dist/Lingua_SingleFile.exe

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: Lingua-Windows-Setup-Installer
        path: dist/Lingua_Installer_v1.1.0.exe
