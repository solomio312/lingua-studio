name: macOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6>=6.6 httpx>=0.27 ebooklib>=0.18 lxml>=5.0 appdirs>=1.4 babel>=2.14 pyinstaller>=6.0 Pillow

    - name: Run Smoke Test (Integrity Check)
      run: |
        python scripts/smoke_test_mac.py

    - name: Build with PyInstaller
      run: |
        pyinstaller lingua_mac.spec --noconfirm

    - name: Inspect bundle size
      run: |
        du -sh dist/Lingua.app
        echo "Top 20 largest files in the bundle:"
        find dist/Lingua.app -type f -exec du -sh {} + | sort -hr | head -n 20

    - name: Zip the application
      run: |
        cd dist
        zip -r Lingua_macOS.zip Lingua.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lingua-macOS-Intel-Build-Old-Machine
        path: dist/Lingua_macOS.zip
