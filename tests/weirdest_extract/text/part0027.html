<h2 class="chapter_number" id="wei0001695"><span id="pg499" epub:type="pagebreak" class="calibre"></span>APPENDIX B</h2>
<h2 class="chapter_title" id="wei0001696">Additional Plots</h2>
<figure class="landscape_large1" id="fig_499"><img src="../images/00075.gif" alt="" id="wei0001705" class="calibre3"/>
<figcaption class="caption" id="the00462"><span class="sans_b">FIGURE B.1.</span> <span class="sans_b">Relationship between the importance of tradition and the (A) Kinship Intensity Index (96 countries) and (B) prevalence of cousin marriage (56 countries). Tradition is a country average based on responses to this question: How similar are you to the person described by this statement: “Tradition is important to her/him. She/he tries to follow the customs handed down by her/his religion or her/his family” (1–7 scale). Cousin marriage is plotted on a logarithmic scale.</span></figcaption></figure>
<figure class="landscape_medium" id="fig_500"><img src="../images/00076.gif" alt="" id="wei0001706" class="calibre19"/>
<figcaption class="caption" id="the00463"><span class="sans_b">FIGURE B.2.</span> <span class="sans_b">Relationship between the frequency of searches for “shame” vs.</span> <span class="sans_b">“guilt” on Google and the Kinship Intensity Index (KII). The dashed line represents</span> <span class="sans_b">the zero line; countries above the line search more often for “shame” than “guilt.” Those below the dashed line search for “guilt” more than “shame.” The plot statistically removes the variation among the nine languages used, allowing us to</span> <span class="sans_b">focus on comparing the 56 countries. Note that Enke didn’t use cousin marriage in</span> <span class="sans_b">his analyses. This is a partial regression plot created using the data on shame and guilt from Enke (2017, 2019).</span></figcaption></figure>
